[project]
name = "lms-bot"
version = "0.1.0"
description = "LMS Telegram Bot"
requires-python = "==3.14.2"
dependencies = [
    "python-telegram-bot>=20.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "aiogram>=3.20",
]

[project.scripts]
bot = "bot:main"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]